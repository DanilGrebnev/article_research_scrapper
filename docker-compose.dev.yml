services:
  backend:
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
    environment:
      - WATCHFILES_FORCE_POLLING=true
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]

  frontend:
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.ts:/app/next.config.ts
      - frontend_node_modules:/app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    command: ["npx", "next", "dev", "--hostname", "0.0.0.0", "--webpack"]

volumes:
  frontend_node_modules:
