services:
  chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2g

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      chrome:
        condition: service_started
    environment:
      - CHROME_URL=http://chrome:4444/wd/hub
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./backend/src:/app/src
    command: ["uv", "run", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/src"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.ts:/app/next.config.ts
