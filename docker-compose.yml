services:
  chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2g

  backend:
    build: ./backend
    depends_on:
      chrome:
        condition: service_started
    environment:
      - CHROME_URL=http://chrome:4444/wd/hub
    volumes:
      - ./downloads:/app/downloads

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
