services:
  chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2g
    ports:
      - "4444:4444"

  app:
    build: .
    depends_on:
      chrome:
        condition: service_started
    volumes:
      - ./downloads:/app/downloads
    environment:
      - CHROME_URL=http://chrome:4444/wd/hub
